<!DOCTYPE html>

<html>
<head>
    <title>Food Delivery Time Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🚚 Food Delivery Time Prediction</h1>
        <p>Predict the delivery time based on order details.</p>

```
    <form action="/predict" method="POST">

        <input type="number" step="0.1" name="distance_km"
            placeholder="Distance (km)" required>

        <select name="weather">
            <option value="">Weather</option>
            <option>Sunny</option>
            <option>Cloudy</option>
            <option>Rainy</option>
        </select>

        <select name="traffic_level">
            <option value="">Traffic Level</option>
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>

        <select name="time_of_day">
            <option value="">Time of Day</option>
            <option>Morning</option>
            <option>Afternoon</option>
            <option>Evening</option>
            <option>Night</option>
        </select>

        <select name="vehicle_type">
            <option value="">Vehicle Type</option>
            <option>Bike</option>
            <option>Scooter</option>
            <option>Car</option>
        </select>

        <input type="number" step="0.1"
            name="preparation_time_min"
            placeholder="Preparation Time (min)"
            required>

        <input type="number" step="0.1"
            name="courier_experience_yrs"
            placeholder="Courier Experience (years)"
            required>

        <button type="submit">
            Predict Delivery Time
        </button>

    </form>
</div>
```

</div>

</body>
</html>
